<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DSDS Button Preview</title>
    <link rel="stylesheet" href="tokens.css">
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        padding: 3rem;
        background: var(--ds-color-bg);
        color: var(--ds-color-text);
        font-family: var(--ds-font-body);
      }
      main { max-width: 52rem; margin: 0 auto; }
      h1 { margin: 0 0 var(--ds-space-2); font-size: var(--ds-font-size-xl); }
      p { max-width: 42rem; line-height: var(--ds-line-height-relaxed); }
      section {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--ds-space-4);
        margin-block: var(--ds-space-8);
        padding: var(--ds-space-4);
        background: var(--ds-color-bg-inverse);
      }
      .label {
        flex-basis: 100%;
        font-weight: var(--ds-font-weight-bold);
        font-size: var(--ds-font-size-sm);
        letter-spacing: var(--ds-tracking-wide);
        text-transform: uppercase;
      }
      code { font-family: var(--ds-font-mono); }
    </style>
    <script type="module" src="components/index.js"></script>
  </head>
  <body>
    <main>
      <h1><code>ds-button</code> preview</h1>
      <p>Orange is the primary action. Black is the secondary action. Tab to each control to inspect the focus treatment, then use Enter or Space to activate it.</p>
      <section>
        <span class="label">Primary</span>
        <ds-button>Save changes</ds-button>
        <ds-button disabled>Disabled primary</ds-button>
      </section>
      <section>
        <span class="label">Secondary</span>
        <ds-button variant="secondary">Cancel</ds-button>
        <ds-button variant="secondary" disabled>Disabled secondary</ds-button>
      </section>
    </main>
  </body>
</html>
