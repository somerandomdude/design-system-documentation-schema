<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <script src="components.js?v=2"></script>
        <style>
            /* ═══════════════════════════════════════════════════════
               Samples page — layout and interactive highlighting
               These styles are specific to the side-by-side
               JSON ↔ rendered documentation viewer.
               ═══════════════════════════════════════════════════════ */

            /* Tab bar */
            .tab-bar {
                display: flex;
                gap: 0;
                background: var(--ds-color-bg);
                border-bottom: var(--ds-border-width-md) solid
                    var(--ds-color-border);
                padding: 0 var(--ds-space-8);
                overflow-x: auto;
                position: sticky;
                top: 0;
                z-index: var(--ds-z-toolbar, 90);
            }
            .tab-btn {
                font-family: var(--ds-font-body);
                padding: var(--ds-space-3) var(--ds-space-6);
                border: none;
                background: none;
                font-size: var(--ds-font-size-md);
                font-weight: var(--ds-font-weight-semibold);
                color: var(--ds-color-text-secondary);
                cursor: pointer;
                border-bottom: var(--ds-border-width-lg) solid transparent;
                margin-bottom: -2px;
                transition:
                    color var(--ds-transition-normal),
                    border-color var(--ds-transition-normal);
                white-space: nowrap;
            }
            .tab-btn:hover {
                color: var(--ds-color-text);
            }
            .tab-btn.active {
                color: var(--ds-color-accent);
                border-bottom-color: var(--ds-color-accent);
            }
            .tab-content {
                display: none;
                padding: var(--ds-space-6) var(--ds-space-8);
                max-width: var(--ds-width-wide);
                margin: 0 auto;
            }
            .tab-content.active {
                display: block;
            }

            /* Section pair — side-by-side code + rendered */
            .section-pair {
                position: relative;
                margin-bottom: var(--ds-space-6);
                border: var(--ds-border-width-sm) solid var(--ds-color-border);
                border-radius: var(--ds-radius-lg);
                overflow: hidden;
            }
            .col-code-wrap {
                position: absolute;
                top: 0;
                left: 0;
                width: 50%;
                height: 100%;
            }
            .col-code {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--ds-color-bg);
                overflow: auto;
            }
            .col-rendered {
                width: 50%;
                margin-left: 50%;
                background: var(--ds-color-bg-subtle);
                border-left: var(--ds-border-width-sm) solid
                    var(--ds-color-border);
            }
            .section-panel {
                border-left: var(--ds-border-width-xl) solid transparent;
                padding: var(--ds-space-4) var(--ds-space-5);
            }

            /* Off-screen highlight indicators */
            .offscreen-indicator {
                position: absolute;
                left: 0;
                right: 0;
                z-index: 10;
                display: none;
                align-items: center;
                justify-content: center;
                gap: var(--ds-space-2);
                padding: var(--ds-space-1) var(--ds-space-3);
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-semibold);
                letter-spacing: var(--ds-tracking-normal);
                color: var(--ds-color-info-text);
                background: var(--ds-color-info-bg);
                cursor: pointer;
                user-select: none;
                pointer-events: auto;
            }
            .offscreen-indicator.above {
                top: 0;
                border-bottom: var(--ds-border-width-sm) solid #93c5fd;
            }
            .offscreen-indicator.below {
                bottom: 0;
                border-top: var(--ds-border-width-sm) solid #93c5fd;
            }
            .offscreen-indicator.visible {
                display: flex;
            }
            .offscreen-indicator .arrow {
                font-size: var(--ds-font-size-md);
            }

            /* Section label */
            .section-label {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                color: #444;
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-wide);
                padding: var(--ds-space-1) 0 var(--ds-space-2);
                margin: 0;
            }

            /* JSON code */
            pre.json-code {
                margin: 0;
                padding: 0;
                font-family: var(--ds-font-mono);
                font-size: 12px;
                line-height: var(--ds-line-height-loose);
                white-space: pre;
                overflow-x: auto;
                background: none;
                border: none;
                border-radius: 0;
            }
            .json-key {
                color: var(--ds-syntax-light-key);
            }
            .json-string {
                color: var(--ds-syntax-light-string);
            }
            .json-number {
                color: var(--ds-syntax-light-number);
            }
            .json-bool {
                color: var(--ds-syntax-light-bool);
            }
            .json-null {
                color: var(--ds-syntax-light-bool);
            }

            /* Field-level hover highlighting */
            span[data-field] {
                transition: background-color var(--ds-transition-fast);
                border-radius: var(--ds-radius-sm);
            }
            span[data-field].hl {
                background-color: var(--ds-color-info-bg);
            }
            .rf {
                transition: outline-color var(--ds-transition-fast);
                border-radius: var(--ds-radius-sm);
                outline: var(--ds-border-width-sm) solid transparent;
                outline-offset: 1px;
            }
            .rf.hl {
                outline-color: #60a5fa;
            }

            /* Rendered section typography */
            .rendered-section h2 {
                margin: 0 0 var(--ds-space-3);
                font-weight: var(--ds-font-weight-bold);
                color: var(--ds-color-text);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-normal);
                font-size: var(--ds-font-size-base);
                border-bottom: none;
                padding-bottom: 0;
            }
            .rendered-section h3 {
                margin: var(--ds-space-4) 0 var(--ds-space-2);
                font-size: var(--ds-font-size-lg);
                font-weight: var(--ds-font-weight-semibold);
            }
            .rendered-section p {
                margin: 0 0 var(--ds-space-2);
                font-size: var(--ds-font-size-md);
                color: #444;
            }

            /* Entity header */
            .entity-header h1 {
                margin: 0 0 var(--ds-space-2);
                font-size: 1.6rem;
                font-weight: var(--ds-font-weight-extrabold);
                border-bottom: none;
                padding-bottom: 0;
            }
            .entity-header .summary {
                font-size: var(--ds-font-size-xl);
                color: var(--ds-color-text-secondary);
                margin: 0 0 var(--ds-space-2);
            }
            .entity-header .description {
                font-size: var(--ds-font-size-md);
                color: #666;
                margin: 0 0 var(--ds-space-3);
                line-height: var(--ds-line-height-relaxed);
            }

            /* Badge variants for rendered output */
            .badge-stable {
                background: var(--ds-color-success-bg);
                color: var(--ds-color-success-text);
            }
            .badge-experimental {
                background: var(--ds-color-warning-bg);
                color: var(--ds-color-warning-text);
            }
            .badge-draft {
                background: var(--ds-color-neutral-bg);
                color: var(--ds-color-neutral-text);
            }
            .badge-deprecated {
                background: var(--ds-color-danger-bg);
                color: var(--ds-color-danger-text);
            }
            .badge-kind {
                background: var(--ds-color-info-bg);
                color: var(--ds-color-info-text);
            }
            .badge-category {
                background: var(--ds-color-purple-bg);
                color: var(--ds-color-purple-text);
            }
            .badge-token-type {
                background: var(--ds-color-indigo-bg);
                color: var(--ds-color-indigo-text);
            }

            /* Tags */
            .tag-list {
                display: flex;
                flex-wrap: wrap;
                gap: var(--ds-space-2);
                margin: var(--ds-space-2) 0;
            }
            .tag {
                display: inline-block;
                padding: var(--ds-space-1) var(--ds-space-2);
                background: var(--ds-color-bg-muted);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-md);
                font-size: var(--ds-font-size-sm);
                font-family: var(--ds-font-mono);
                color: var(--ds-color-text-secondary);
            }

            /* Meta row */
            .meta-row {
                display: flex;
                flex-wrap: wrap;
                gap: var(--ds-space-4);
                margin: var(--ds-space-2) 0;
                font-size: var(--ds-font-size-base);
                color: #666;
            }
            .meta-row strong {
                color: #444;
            }

            /* Platform / data tables */
            .platform-table,
            .data-table {
                width: 100%;
                border-collapse: collapse;
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }
            .platform-table th,
            .platform-table td,
            .data-table th,
            .data-table td {
                text-align: left;
                padding: var(--ds-space-2) var(--ds-space-3);
                border-bottom: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                vertical-align: top;
            }
            .platform-table th,
            .data-table th {
                font-weight: var(--ds-font-weight-semibold);
                color: var(--ds-color-text-secondary);
                background: var(--ds-color-bg-subtle);
                white-space: nowrap;
            }
            .data-table td code {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-sm);
                background: var(--ds-color-bg-muted);
                padding: 1px 5px;
                border-radius: var(--ds-radius-sm);
            }

            /* Use case cards */
            .use-case {
                display: flex;
                gap: var(--ds-space-3);
                padding: var(--ds-space-3);
                margin-bottom: var(--ds-space-2);
                border-radius: var(--ds-radius-lg);
                font-size: var(--ds-font-size-md);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                background: var(--ds-color-bg);
            }
            .use-case.positive {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-success-text);
            }
            .use-case.negative {
                border-left: var(--ds-border-width-xl) solid #ef5350;
            }
            .use-case-badge {
                flex-shrink: 0;
                width: 22px;
                height: 22px;
                border-radius: var(--ds-radius-full);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-extrabold);
                color: var(--ds-color-bg);
            }
            .use-case.positive .use-case-badge {
                background: var(--ds-color-success-text);
            }
            .use-case.negative .use-case-badge {
                background: #ef5350;
            }
            .alternative-note {
                margin-top: var(--ds-space-2);
                font-size: var(--ds-font-size-sm);
                color: #777;
                padding-left: var(--ds-space-3);
                border-left: var(--ds-border-width-md) solid
                    var(--ds-color-border-light);
            }
            .alternative-note strong {
                color: var(--ds-color-text-secondary);
            }

            /* Best practice cards */
            .bp-card {
                padding: var(--ds-space-3) var(--ds-space-4);
                border-radius: var(--ds-radius-lg);
                margin-bottom: var(--ds-space-3);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                background: var(--ds-color-bg);
                font-size: var(--ds-font-size-md);
            }
            .bp-card.required {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-info-text);
            }
            .bp-card.encouraged {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-success-text);
            }
            .bp-card.prohibited {
                border-left: var(--ds-border-width-xl) solid #ef5350;
            }
            .bp-card.informational {
                border-left: var(--ds-border-width-xl) solid #9e9e9e;
            }
            .bp-kind-badge {
                display: inline-block;
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                padding: var(--ds-space-1) 7px;
                border-radius: var(--ds-radius-sm);
                margin-right: var(--ds-space-2);
                margin-bottom: var(--ds-space-1);
            }
            .bp-kind-badge.required {
                background: var(--ds-color-required-bg);
                color: var(--ds-color-required-text);
            }
            .bp-kind-badge.encouraged {
                background: var(--ds-color-encouraged-bg);
                color: var(--ds-color-encouraged-text);
            }
            .bp-kind-badge.prohibited {
                background: var(--ds-color-prohibited-bg);
                color: var(--ds-color-prohibited-text);
            }
            .bp-kind-badge.informational {
                background: var(--ds-color-neutral-bg);
                color: #424242;
            }
            .bp-category {
                display: inline-block;
                font-size: var(--ds-font-size-xs);
                padding: var(--ds-space-1) 7px;
                border-radius: var(--ds-radius-sm);
                background: var(--ds-color-bg-muted);
                color: #666;
                margin-bottom: var(--ds-space-2);
            }
            .bp-card .rationale {
                margin-top: var(--ds-space-2);
                font-size: var(--ds-font-size-sm);
                color: #777;
                font-style: italic;
            }

            /* WCAG badge */
            .wcag-badge {
                display: inline-block;
                padding: var(--ds-space-1) var(--ds-space-3);
                border-radius: var(--ds-radius-md);
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                background: #e8f5e9;
                color: var(--ds-color-success-text);
                margin-bottom: var(--ds-space-3);
            }

            /* Color swatch + value display */
            .color-swatch {
                display: inline-block;
                width: 32px;
                height: 32px;
                border-radius: var(--ds-radius-lg);
                border: var(--ds-border-width-sm) solid #ccc;
                vertical-align: middle;
                margin-right: var(--ds-space-2);
            }
            .value-display {
                display: flex;
                align-items: center;
                gap: var(--ds-space-3);
                padding: var(--ds-space-3) var(--ds-space-4);
                background: var(--ds-color-bg);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
                margin: var(--ds-space-2) 0;
            }
            .value-display code {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-md);
                font-weight: var(--ds-font-weight-semibold);
            }
            .value-meta {
                font-size: var(--ds-font-size-sm);
                color: #777;
            }

            /* Link groups */
            .link-group {
                margin-bottom: var(--ds-space-3);
            }
            .link-group-label {
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-wide);
                color: var(--ds-color-text-muted);
                margin-bottom: var(--ds-space-1);
            }
            .link-item {
                display: flex;
                align-items: center;
                gap: var(--ds-space-2);
                padding: var(--ds-space-2) 0;
                font-size: var(--ds-font-size-md);
            }
            .link-item a {
                color: var(--ds-color-accent);
                text-decoration: none;
            }
            .link-item a:hover {
                text-decoration: underline;
            }
            .link-icon {
                font-size: var(--ds-font-size-md);
                width: var(--ds-space-5);
                text-align: center;
            }

            /* Token map */
            .token-map {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--ds-space-1) var(--ds-space-4);
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }
            .token-map-entry {
                font-family: var(--ds-font-mono);
                padding: var(--ds-space-1) 0;
                color: var(--ds-color-text-secondary);
            }

            /* Spec grid */
            .spec-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--ds-space-4);
                margin: var(--ds-space-2) 0;
            }
            .spec-box {
                padding: var(--ds-space-3);
                background: var(--ds-color-bg);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
            }
            .spec-box h4 {
                margin: 0 0 var(--ds-space-2);
                font-size: var(--ds-font-size-base);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-normal);
                color: var(--ds-color-text-muted);
            }
            .spec-entry {
                display: flex;
                justify-content: space-between;
                font-size: var(--ds-font-size-base);
                padding: var(--ds-space-1) 0;
                border-bottom: var(--ds-border-width-sm) solid
                    var(--ds-color-bg-subtle);
            }
            .spec-entry-key {
                color: var(--ds-color-text-secondary);
            }
            .spec-entry-val {
                font-family: var(--ds-font-mono);
                color: var(--ds-syntax-light-key);
                font-size: var(--ds-font-size-sm);
            }

            /* Variant card */
            .variant-card {
                padding: var(--ds-space-3);
                margin-bottom: var(--ds-space-2);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
                background: var(--ds-color-bg);
            }
            .variant-card h4 {
                margin: 0 0 var(--ds-space-1);
                font-size: var(--ds-font-size-md);
            }
            .variant-card p {
                margin: 0;
                font-size: var(--ds-font-size-base);
                color: var(--ds-color-text-secondary);
            }

            /* Preview placeholder */
            .preview-placeholder {
                background: var(--ds-color-bg-muted);
                border: var(--ds-border-width-md) dashed var(--ds-color-border);
                border-radius: var(--ds-radius-lg);
                padding: var(--ds-space-6);
                text-align: center;
                color: var(--ds-color-text-muted);
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }

            /* Responsive */
            @media (max-width: 960px) {
                .section-pair {
                    position: static;
                }
                .col-code-wrap {
                    position: static;
                    width: 100%;
                    height: auto;
                }
                .col-code {
                    position: static;
                    width: 100%;
                    height: auto !important;
                    max-height: 400px;
                }
                .col-rendered {
                    width: 100%;
                    margin-left: 0;
                    border-left: none;
                    border-top: var(--ds-border-width-sm) solid
                        var(--ds-color-border);
                }
                .tab-content {
                    padding: var(--ds-space-4);
                }
                .spec-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>

                        ],
                        "guidelines": [
                            {
                                "kind": "purpose",
                                "useCases": [
                                    {
                                        "description": "When the user's system preference is `prefers-color-scheme: dark` or they have explicitly selected dark mode in the application settings.",
                                        "kind": "positive"
                                    },
                                    {

                                        "kind": "positive"
                                    },

                                    {
                                        "description": "When high-contrast accessibility is the primary concern rather than a dark aesthetic.",
                                        "kind": "negative",
                                        "alternative": {
                                            "name": "high-contrast",
                                            "rationale": "The dark theme is optimized for comfort in low-light environments, not maximum contrast. The high-contrast theme provides stronger contrast ratios that better serve users with low vision."
                                        }

                                    {
                                        "description": "When the content is primarily photographic or illustrative and the surrounding chrome should not compete visually.",
                                        "kind": "negative",
                                        "alternative": {
                                            "name": "light",
                                            "rationale": "Photographic content often assumes a neutral white surround for accurate color perception. A dark surround shifts the viewer's perception of brightness and color in the images."
                                        }
                                    }
                                ]
                            },
                            {
                                "kind": "best-practices",
                                "items": [
                                    {
                                        "guidance": "Apply the dark theme at the application root when the user's system preference is `prefers-color-scheme: dark` or when they explicitly select dark mode in the application settings.",
                                        "rationale": "Respecting the user's color scheme preference improves comfort in low-light environments and can reduce eye strain. Forcing a color mode against the user's preference creates friction.",
                                        "kind": "required",
                                        "category": "development"
                                    },
                                    {
                                        "guidance": "In dark mode, layers become one step lighter with each added layer. Do not apply components that are darker than their background surface.",
                                        "rationale": "The dark theme's layering model uses increasing lightness to communicate depth. Reversing this — placing darker elements on lighter surfaces — breaks the spatial hierarchy and confuses the visual relationship between layers.",
                                        "kind": "required",
                                        "category": "visual-design"
                                    },
                                    {
                                        "guidance": "Do not mix light-mode and dark-mode semantic tokens on the same surface. Use inline theme switching if a component must appear in the opposite mode.",
                                        "rationale": "Mixing tokens from different themes produces unpredictable contrast pairings. Semantic tokens are only validated for contrast within their own theme context.",
                                        "kind": "prohibited",
                                        "category": "visual-design"
                                    },
                                    {
                                        "guidance": "Shadows (elevation tokens) are replaced with surface color differentiation in dark mode. Do not add custom box-shadow values to create depth.",
                                        "rationale": "Dark backgrounds absorb shadow, making traditional drop shadows invisible or visually muddy. The dark theme communicates depth through lighter surface values instead.",
                                        "kind": "discouraged",
                                        "category": "visual-design"
                                    },
                                    {
                                        "guidance": "Ensure all custom illustrations, charts, and images remain legible in dark mode. Provide dark-mode variants of images that use light backgrounds or thin strokes.",
                                        "rationale": "Illustrations designed for light backgrounds may become invisible or illegible on dark surfaces. Custom visual content requires the same level of dark-mode adaptation as UI components.",
                                        "kind": "encouraged",
                                        "category": "visual-design"
                                    }
                                ]
                            },
                            {
                                "kind": "accessibility",
                                "wcagLevel": "AA",
                                "colorContrast": [

                                    },
                                    {

                                        "level": "AA",
                                        "context": "Link text (#45A3FE) on default dark background (#111111)."

                        ],
                        "links": [
                            {
                                "kind": "design",
                                "url": "https://www.figma.com/file/abc123/color-system?node-id=100:200",
                                "label": "Figma — Dark mode variable collection"
                            },
                            {
                                "kind": "documentation",
                                "url": "https://design.example.com/foundations/color/dark-mode",
                                "label": "Dark mode usage guidelines"
                            },
                            {
                                "kind": "source",
                                "url": "https://github.com/example/design-system/blob/main/tokens/themes/dark.tokens.json",
                                "label": "Dark theme token source (DTCG format)"
                            }
                        ],
                        "$extensions": {
                            "com.designTool": {
                                "variableCollectionId": "VariableCollectionId:dark-mode"
                            }
                        }
                    }
                </script>

                <script>
                    (function () {
                        "use strict";

                        /* ── Helpers ─────────────────────────────────────────── */
                        var $$ = function (s, c) {
                            return Array.prototype.slice.call(
                                (c || document).querySelectorAll(s),
                            );
                        };

                        function esc(s) {
                            if (s == null) return "";
                            return String(s)
                                .replace(/&/g, "&amp;")
                                .replace(/</g, "&lt;")
                                .replace(/>/g, "&gt;")
                                .replace(/"/g, "&quot;");
                        }

                        var SECTION_COLORS = {
                            header: "#4A4A4A",
                            anatomy: "#E57373",
                            api: "#64B5F6",
                            variants: "#81C784",
                            states: "#FFB74D",
                            "design-specifications": "#BA68C8",
                            purpose: "#4DB6AC",
                            "best-practices": "#FF8A65",
                            accessibility: "#A1887F",
                            links: "#90A4AE",
                            value: "#7986CB",
                            "token-api": "#7986CB",
                        };

                        function secStyle(n) {
                            return (
                                "border-left-color:" +
                                (SECTION_COLORS[n] || "#ccc")
                            );
                        }

                        var LINK_ICONS = {
                            source: "\uD83D\uDCC4",
                            design: "\uD83C\uDFA8",
                            storybook: "\uD83D\uDCD6",
                            package: "\uD83D\uDCE6",
                            alternative: "\u2194",
                            child: "\u2198",
                            parent: "\u2196",
                            documentation: "\uD83D\uDCDD",
                            related: "\uD83D\uDD17",
                        };

                        /* ── Unique field id counter ────────────────────────── */
                        var _fid = 0;
                        function fid(prefix) {
                            return prefix + "-" + ++_fid;
                        }

                        /* ── Syntax highlight a JSON string ─────────────────── */
                        function synHL(json) {
                            if (typeof json !== "string")
                                json = JSON.stringify(json, null, 2);
                            json = esc(json);
                            return json.replace(
                                /(&quot;(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\&])*?&quot;)(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?/g,
                                function (m) {
                                    var c = "json-number";
                                    if (/^&quot;/.test(m)) {
                                        c = /:$/.test(m)
                                            ? "json-key"
                                            : "json-string";
                                    } else if (/true|false/.test(m)) {
                                        c = "json-bool";
                                    } else if (/null/.test(m)) {
                                        c = "json-null";
                                    }
                                    return (
                                        '<span class="' +
                                        c +
                                        '">' +
                                        m +
                                        "</span>"
                                    );
                                },
                            );
                        }

                        /* ── Wrap a JSON fragment with a data-field span ────── */
                        /* Returns highlighted JSON lines with the specified field id wrapping each line */
                        function fieldJSON(obj, fieldId) {
                            var raw = JSON.stringify(obj, null, 2);
                            var lines = raw.split("\n");
                            var out = [];
                            for (var i = 0; i < lines.length; i++) {
                                out.push(
                                    '<span data-field="' +
                                        fieldId +
                                        '">' +
                                        synHL(lines[i]) +
                                        "</span>",
                                );
                            }
                            return out.join("\n");
                        }

                        /* ── Wrap a rendered element with a data-field span ─── */
                        function rf(fieldId, html) {
                            return (
                                '<span class="rf" data-field="' +
                                fieldId +
                                '">' +
                                html +
                                "</span>"
                            );
                        }
                        /* Block-level version */
                        function rfDiv(fieldId, html) {
                            return (
                                '<div class="rf" data-field="' +
                                fieldId +
                                '">' +
                                html +
                                "</div>"
                            );
                        }

                        function statusBadge(s) {
                            var v = s || "draft";
                            return (
                                '<ds-badge variant="' +
                                esc(v) +
                                '" size="sm">' +
                                esc(v) +
                                "</ds-badge>"
                            );
                        }

                        /**
                         * Normalize status: can be a string ("stable") or an
                         * object ({ overall, platforms }). Always returns
                         * { overall: string, platforms: object|null }.
                         */
                        function normalizeStatus(raw) {
                            if (!raw)
                                return { overall: "draft", platforms: null };
                            if (typeof raw === "string")
                                return { overall: raw, platforms: null };
                            return {
                                overall: raw.overall || "draft",
                                platforms: raw.platforms || null,
                            };
                        }

                        function renderStatusHTML(status, includePlatformNote) {
                            var s = normalizeStatus(status);
                            var html =
                                "<div>" + statusBadge(s.overall) + "</div>";
                            if (s.platforms) {
                                var noteCol = includePlatformNote
                                    ? "<th>Note</th>"
                                    : "";
                                html +=
                                    '<table class="platform-table"><thead><tr><th>Platform</th><th>Status</th><th>Since</th>' +
                                    noteCol +
                                    "</tr></thead><tbody>";
                                Object.keys(s.platforms).forEach(function (p) {
                                    var pl = s.platforms[p];
                                    var noteCell = includePlatformNote
                                        ? '<td style="font-size:0.78rem;color:#888">' +
                                          esc(pl.description || "") +
                                          "</td>"
                                        : "";
                                    html +=
                                        "<tr><td>" +
                                        esc(p) +
                                        "</td><td>" +
                                        statusBadge(pl.status) +
                                        "</td><td>" +
                                        esc(pl.since || "\u2014") +
                                        "</td>" +
                                        noteCell +
                                        "</tr>";
                                });
                                html += "</tbody></table>";
                            }
                            return html;
                        }

                        /* ── Build a complete section pair ──────────────────── */
                        function sectionPair(
                            sectionName,
                            label,
                            codeHTML,
                            renderedHTML,
                        ) {
                            return (
                                '<div class="section-pair">' +
                                '<div class="col-code-wrap">' +
                                '<div class="col-code">' +
                                '<div class="section-panel" style="' +
                                secStyle(sectionName) +
                                '">' +
                                '<p class="section-label">' +
                                esc(label) +
                                "</p>" +
                                '<pre class="json-code">' +
                                codeHTML +
                                "</pre>" +
                                "</div>" +
                                "</div>" +
                                '<div class="offscreen-indicator above" data-dir="above"><span class="arrow">\u2191</span> Highlighted code above</div>' +
                                '<div class="offscreen-indicator below" data-dir="below"><span class="arrow">\u2193</span> Highlighted code below</div>' +
                                "</div>" +
                                '<div class="col-rendered"><div class="section-panel rendered-section" style="' +
                                secStyle(sectionName) +
                                '">' +
                                renderedHTML +
                                "</div></div></div>"
                            );
                        }

                        /* ═══════════════════════════════════════════════════════
            COMPONENT RENDERER
            ═══════════════════════════════════════════════════════ */
                        function renderComponent(data) {
                            var html = "";
                            var gMap = {};
                            if (data.guidelines)
                                data.guidelines.forEach(function (g) {
                                    gMap[g.kind] = g;
                                });

                            /* ── Header ────────────────────────────────────────── */
                            (function () {
                                var f_dn = fid("h"),
                                    f_sum = fid("h"),
                                    f_desc = fid("h"),
                                    f_status = fid("h"),
                                    f_since = fid("h"),
                                    f_tags = fid("h"),
                                    f_cat = fid("h"),
                                    f_aliases = fid("h"),
                                    f_kind = fid("h");

                                var code = "{\n";
                                code +=
                                    fieldJSON({ kind: data.kind }, f_kind) +
                                    ",\n";
                                code +=
                                    fieldJSON(
                                        { displayName: data.displayName },
                                        f_dn,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { summary: data.summary },
                                        f_sum,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { description: data.description },
                                        f_desc,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { status: data.status },
                                        f_status,
                                    ) + ",\n";
                                code +=
                                    fieldJSON({ since: data.since }, f_since) +
                                    ",\n";
                                code +=
                                    fieldJSON({ tags: data.tags }, f_tags) +
                                    ",\n";
                                code +=
                                    fieldJSON(
                                        { category: data.category },
                                        f_cat,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { aliases: data.aliases },
                                        f_aliases,
                                    ) + "\n}";

                                var r =
                                    '<div class="entity-header">' +
                                    rfDiv(
                                        f_dn,
                                        "<h1>" +
                                            esc(data.displayName) +
                                            "</h1>",
                                    ) +
                                    rfDiv(
                                        f_sum,
                                        '<p class="summary">' +
                                            esc(data.summary) +
                                            "</p>",
                                    ) +
                                    rfDiv(
                                        f_desc,
                                        '<p class="description">' +
                                            esc(data.description) +
                                            "</p>",
                                    ) +
                                    rfDiv(
                                        f_status,
                                        renderStatusHTML(data.status, true),
                                    ) +
                                    rfDiv(
                                        f_kind,
                                        '<ds-badge variant="kind" size="sm">' +
                                            esc(data.kind) +
                                            "</ds-badge>",
                                    ) +
                                    rfDiv(
                                        f_cat,
                                        '<ds-badge variant="category" size="sm">' +
                                            esc(data.category) +
                                            "</ds-badge>",
                                    ) +
                                    rfDiv(
                                        f_since,
                                        '<div class="meta-row"><strong>Since:</strong> v' +
                                            esc(data.since) +
                                            "</div>",
                                    ) +
                                    rfDiv(
                                        f_tags,
                                        '<div class="tag-list">' +
                                            (data.tags || [])
                                                .map(function (t) {
                                                    return (
                                                        '<span class="tag">' +
                                                        esc(t) +
                                                        "</span>"
                                                    );
                                                })
                                                .join("") +
                                            "</div>",
                                    ) +
                                    rfDiv(
                                        f_aliases,
                                        '<div style="margin-top:4px;font-size:0.8rem;color:#888"><strong>Aliases:</strong> ' +
                                            (data.aliases || [])
                                                .map(function (a) {
                                                    return (
                                                        "<code>" +
                                                        esc(a) +
                                                        "</code>"
                                                    );
                                                })
                                                .join(", ") +
                                            "</div>",
                                    ) +
                                    "</div>";
                                html += sectionPair(
                                    "header",
                                    "Entity Header",
                                    code,
                                    r,
                                );
                            })();

                            /* ── Anatomy ──────────────────────────────────────── */
                            if (gMap.anatomy)
                                (function () {
                                    var a = gMap.anatomy;
                                    var f_desc = fid("an"),
                                        f_parts = [],
                                        f_preview = fid("an");

                                    var codeLines = [
                                        '<span data-field="' +
                                            f_desc +
                                            '">' +
                                            synHL(
                                                '"description": ' +
                                                    JSON.stringify(
                                                        a.description,
                                                    ),
                                            ) +
                                            "</span>,",
                                    ];
                                    codeLines.push(synHL('"parts": ['));
                                    (a.parts || []).forEach(function (p, i) {
                                        var pid = fid("an");
                                        f_parts.push({ id: pid, part: p });
                                        codeLines.push(
                                            fieldJSON(p, pid) +
                                                (i < a.parts.length - 1
                                                    ? ","
                                                    : ""),
                                        );
                                    });
                                    codeLines.push(synHL("]"));
                                    if (a.preview)
                                        codeLines.push(
                                            ",\n" +
                                                fieldJSON(
                                                    { preview: a.preview },
                                                    f_preview,
                                                ),
                                        );

                                    var r =
                                        "<h2>Anatomy</h2>" +
                                        rfDiv(
                                            f_desc,
                                            "<p>" + esc(a.description) + "</p>",
                                        ) +
                                        '<table class="data-table"><thead><tr><th>Part</th><th>Required</th><th>Description</th></tr></thead><tbody>' +
                                        f_parts
                                            .map(function (fp) {
                                                var p = fp.part;
                                                var toks = "";
                                                if (p.tokens) {
                                                    toks =
                                                        '<div style="margin-top:4px">' +
                                                        Object.keys(p.tokens)
                                                            .map(function (k) {
                                                                return (
                                                                    '<span style="font-family:var(--font-mono);font-size:0.72rem;background:#e8eaf6;padding:1px 5px;border-radius:3px;margin-right:4px;display:inline-block;margin-bottom:2px">' +
                                                                    esc(k) +
                                                                    ": " +
                                                                    esc(
                                                                        p
                                                                            .tokens[
                                                                            k
                                                                        ],
                                                                    ) +
                                                                    "</span>"
                                                                );
                                                            })
                                                            .join("") +
                                                        "</div>";
                                                }
                                                return (
                                                    '<tr class="rf" data-field="' +
                                                    fp.id +
                                                    '"><td><strong>' +
                                                    esc(p.displayName) +
                                                    "</strong><br><code>" +
                                                    esc(p.name) +
                                                    "</code></td><td>" +
                                                    (p.required
                                                        ? "Yes"
                                                        : "No") +
                                                    "</td><td>" +
                                                    esc(p.description) +
                                                    toks +
                                                    "</td></tr>"
                                                );
                                            })
                                            .join("") +
                                        "</tbody></table>";
                                    if (a.preview && a.preview.length) {
                                        r += rfDiv(
                                            f_preview,
                                            '<div class="preview-placeholder">\uD83D\uDDBC ' +
                                                esc(a.preview[0].title) +
                                                "</div>",
                                        );
                                    }
                                    html += sectionPair(
                                        "anatomy",
                                        "Anatomy",
                                        codeLines.join("\n"),
                                        r,
                                    );
                                })();

                            /* ── API ──────────────────────────────────────────── */
                            if (gMap.api)
                                (function () {
                                    var api = gMap.api;
                                    var f_props = [],
                                        f_events = [],
                                        f_slots = [],
                                        f_css = [];

                                    var codeLines = [synHL('"properties": [')];
                                    (api.properties || []).forEach(
                                        function (p, i) {
                                            var pid = fid("ap");
                                            f_props.push({ id: pid, prop: p });
                                            codeLines.push(
                                                fieldJSON(p, pid) +
                                                    (i <
                                                    api.properties.length - 1
                                                        ? ","
                                                        : ""),
                                            );
                                        },
                                    );
                                    codeLines.push(synHL("],"));

                                    if (api.events) {
                                        codeLines.push(synHL('"events": ['));
                                        api.events.forEach(function (e, i) {
                                            var eid = fid("ae");
                                            f_events.push({ id: eid, ev: e });
                                            codeLines.push(
                                                fieldJSON(e, eid) +
                                                    (i < api.events.length - 1
                                                        ? ","
                                                        : ""),
                                            );
                                        });
                                        codeLines.push(synHL("],"));
                                    }
                                    if (api.slots) {
                                        api.slots.forEach(function (s) {
                                            var sid = fid("as");
                                            f_slots.push({ id: sid, slot: s });
                                            codeLines.push(synHL('"slots": ['));
                                            codeLines.push(fieldJSON(s, sid));
                                            codeLines.push(synHL("]"));
                                        });
                                    }
                                    if (api.cssCustomProperties) {
                                        codeLines.push(
                                            synHL('"cssCustomProperties": ['),
                                        );
                                        api.cssCustomProperties.forEach(
                                            function (c, i) {
                                                var cid = fid("ac");
                                                f_css.push({ id: cid, cp: c });
                                                codeLines.push(
                                                    fieldJSON(c, cid) +
                                                        (i <
                                                        api.cssCustomProperties
                                                            .length -
                                                            1
                                                            ? ","
                                                            : ""),
                                                );
                                            },
                                        );
                                        codeLines.push(synHL("]"));
                                    }

                                    var r =
                                        "<h2>API</h2><h3>Properties</h3>" +
                                        '<table class="data-table"><thead><tr><th>Name</th><th>Type</th><th>Default</th><th>Description</th></tr></thead><tbody>' +
                                        f_props
                                            .map(function (fp) {
                                                var p = fp.prop;
                                                return (
                                                    '<tr class="rf" data-field="' +
                                                    fp.id +
                                                    '"><td><code>' +
                                                    esc(p.name) +
                                                    "</code></td><td><code>" +
                                                    esc(p.type) +
                                                    "</code></td><td>" +
                                                    (p.defaultValue !==
                                                    undefined
                                                        ? "<code>" +
                                                          esc(
                                                              String(
                                                                  p.defaultValue,
                                                              ),
                                                          ) +
                                                          "</code>"
                                                        : "\u2014") +
                                                    "</td><td>" +
                                                    esc(p.description) +
                                                    "</td></tr>"
                                                );
                                            })
                                            .join("") +
                                        "</tbody></table>";

                                    if (f_events.length) {
                                        r +=

                        /* ═══════════════════════════════════════════════════════

                        function renderToken(data) {

                                    f_since = fid("th"),
                                    f_tags = fid("th"),
                                    f_tt = fid("th"),
                                    f_cat = fid("th"),
                                    f_aliases = fid("th"),
                                    f_kind = fid("th");

                                var code = "{\n";
                                code +=
                                    fieldJSON({ kind: data.kind }, f_kind) +
                                    ",\n";
                                code +=
                                    fieldJSON({ name: data.name }, f_name) +
                                    ",\n";
                                code +=
                                    fieldJSON(
                                        { summary: data.summary },
                                        f_sum,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { description: data.description },
                                        f_desc,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { status: data.status },
                                        f_status,
                                    ) + ",\n";
                                code +=
                                    fieldJSON({ since: data.since }, f_since) +
                                    ",\n";
                                code +=
                                    fieldJSON({ tags: data.tags }, f_tags) +
                                    ",\n";
                                code +=
                                    fieldJSON(
                                        { tokenType: data.tokenType },
                                        f_tt,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { category: data.category },
                                        f_cat,
                                    ) + ",\n";
                                code +=
                                    fieldJSON(
                                        { aliases: data.aliases },
                                        f_aliases,
                                    ) + "\n}";

                                var r =
                                    '<div class="entity-header">' +
                                    rfDiv(
                                        f_name,
                                        "<h1>" + esc(data.name) + "</h1>",
                                    ) +
                                    rfDiv(
                                        f_sum,
                                        '<p class="summary">' +
                                            esc(data.summary) +
                                            "</p>",
                                    ) +
                                    rfDiv(
                                        f_desc,
                                        '<p class="description">' +
                                            esc(data.description) +
                                            "</p>",
                                    ) +
                                    rfDiv(
                                        f_status,
                                        renderStatusHTML(data.status, false),
                                    ) +
                                    rfDiv(
                                        f_kind,
                                        '<ds-badge variant="kind" size="sm">' +
                                            esc(data.kind) +
                                            "</ds-badge>",
                                    ) +
                                    rfDiv(
                                        f_tt,
                                        '<ds-badge variant="token-type" size="sm">' +
                                            esc(data.tokenType) +
                                            "</ds-badge>",
                                    ) +
                                    rfDiv(
                                        f_cat,
                                        '<ds-badge variant="category" size="sm">' +
                                            esc(data.category) +
                                            "</ds-badge>",
                                    ) +
                                    rfDiv(
                                        f_since,
                                        '<div class="meta-row"><strong>Since:</strong> v' +
                                            esc(data.since) +
                                            "</div>",
                                    ) +
                                    rfDiv(
                                        f_tags,
                                        '<div class="tag-list">' +
                                            (data.tags || [])
                                                .map(function (t) {
                                                    return (
                                                        '<span class="tag">' +
                                                        esc(t) +
                                                        "</span>"
                                                    );
                                                })
                                                .join("") +
                                            "</div>",
                                    ) +
                                    rfDiv(
                                        f_aliases,
                                        '<div style="margin-top:4px;font-size:0.8rem;color:#888"><strong>Aliases:</strong> ' +
                                            (data.aliases || [])
                                                .map(function (a) {
                                                    return (
                                                        "<code>" +
                                                        esc(a) +
                                                        "</code>"
                                                    );
                                                })
                                                .join(", ") +
                                            "</div>",
                                    ) +
                                    "</div>";

                                    "header",
                                    "Entity Header",
                                    code,
                                    r,
                                );
                            })();

                            /* ── Value ─────────────────────────────────────────── */
                            if (data.value)
                                (function () {
                                    var val = data.value;
                                    var f_resolved = fid("tv"),
                                        f_ref = fid("tv"),
                                        f_res = fid("tv"),
                                        f_dtcg = fid("tv");

                                    var code = "{\n";
                                    code +=
                                        fieldJSON(
                                            { resolved: val.resolved },
                                            f_resolved,
                                        ) + ",\n";
