                                            fieldJSON(
                                                { reference: val.reference },
                                                f_ref,
                                            ) + ",\n";
                                    if (val.resolution)
                                        code +=
                                            fieldJSON(
                                                { resolution: val.resolution },
                                                f_res,
                                            ) + ",\n";
                                    if (val.dtcgFile)
                                        code +=
                                            fieldJSON(
                                                { dtcgFile: val.dtcgFile },
                                                f_dtcg,
                                            ) + "\n";
                                    code += "}";

                                    var isColor = data.tokenType === "color";
                                    var r =
                                        '<h2>Value</h2><div class="value-display">';
                                    if (isColor)
                                        r += rf(
                                            f_resolved,
                                            '<div class="color-swatch" style="background:' +
                                                esc(val.resolved) +
                                                '"></div>',
                                        );
                                    r +=
                                        "<div>" +
                                        rfDiv(
                                            f_resolved,
                                            "<code>" +
                                                esc(val.resolved) +
                                                "</code>",
                                        );
                                    if (val.reference)
                                        r += rfDiv(
                                            f_ref,
                                            '<div class="value-meta"><strong>Reference:</strong> <code>' +
                                                esc(val.reference) +
                                                "</code></div>",
                                        );
                                    if (val.resolution)
                                        r += rfDiv(
                                            f_res,
                                            '<div class="value-meta"><strong>Resolution:</strong> ' +
                                                esc(val.resolution) +
                                                "</div>",
                                        );
                                    if (val.dtcgFile)
                                        r += rfDiv(
                                            f_dtcg,
                                            '<div class="value-meta"><strong>DTCG file:</strong> <code>' +
                                                esc(val.dtcgFile) +
                                                "</code></div>",
                                        );
                                    r += "</div></div>";
                                    html += sectionPair(
                                        "value",
                                        "Value",
                                        code,
                                        r,
                                    );
                                })();

                            /* ── API (token) ──────────────────────────────────── */
                            if (data.api)
                                (function () {
                                    var tapi = data.api;
                                    var fields = [];
                                    var codeLines = [synHL("{")];
                                    Object.keys(tapi).forEach(function (k, i) {
                                        var tid = fid("ta");
                                        fields.push({
                                            id: tid,
                                            key: k,
                                            val: tapi[k],
                                        });
                                        var obj = {};
                                        obj[k] = tapi[k];
                                        codeLines.push(
                                            fieldJSON(obj, tid) +
                                                (i <
                                                Object.keys(tapi).length - 1
                                                    ? ","
                                                    : ""),
                                        );
                                    });
                                    codeLines.push(synHL("}"));

                                    var r =
                                        "<h2>API \u2014 Platform Token Names</h2>" +
                                        '<table class="data-table"><thead><tr><th>Platform</th><th>Token Name</th></tr></thead><tbody>' +
                                        fields
                                            .map(function (f) {
                                                return (
                                                    '<tr class="rf" data-field="' +
                                                    f.id +
                                                    '"><td>' +
                                                    esc(f.key) +
                                                    "</td><td><code>" +
                                                    esc(f.val) +
                                                    "</code></td></tr>"
                                                );
                                            })
                                            .join("") +
                                        "</tbody></table>";
                                    html += sectionPair(
                                        "token-api",
                                        "API (Token)",
                                        codeLines.join("\n"),
                                        r,
                                    );
                                })();

                            /* ── Purpose ──────────────────────────────────────── */
                            if (gMap.purpose)
                                (function () {
                                    var pur = gMap.purpose;
                                    var codeLines = [synHL('"useCases": [')];
                                    var pos = "",
                                        neg = "";
                                    (pur.useCases || []).forEach(
                                        function (u, i) {
                                            var uid = fid("tp");
                                            codeLines.push(
                                                fieldJSON(u, uid) +
                                                    (i < pur.useCases.length - 1
                                                        ? ","
                                                        : ""),
                                            );
                                            var card =
                                                '<div class="use-case ' +
                                                (u.kind || "positive") +
                                                '"><div class="use-case-badge">' +
                                                (u.kind === "positive"
                                                    ? "\u2713"
                                                    : "\u2717") +
                                                "</div><div>" +
                                                esc(u.description);
                                            if (u.alternative) {
                                                card +=
                                                    '<div class="alternative-note"><strong>Use instead:</strong> <code>' +
                                                    esc(u.alternative.name) +
                                                    "</code> \u2014 " +
                                                    esc(
                                                        u.alternative.rationale,
                                                    ) +
                                                    "</div>";
                                            }
                                            card += "</div></div>";
                                            if (u.kind === "positive")
                                                pos += rfDiv(uid, card);
                                            else neg += rfDiv(uid, card);
                                        },
                                    );
                                    codeLines.push(synHL("]"));
                                    html += sectionPair(
                                        "purpose",
                                        "Purpose",
                                        codeLines.join("\n"),
                                        "<h2>Purpose</h2><h3>When to Use</h3>" +
                                            pos +
                                            (neg
                                                ? "<h3>When Not to Use</h3>" +
                                                  neg
                                                : ""),
                                    );
                                })();

                            /* ── Best Practices ───────────────────────────────── */
                            if (gMap["best-practices"])
                                (function () {
                                    var bp = gMap["best-practices"];
                                    var codeLines = [synHL('"items": [')];
                                    var rCards = "";
                                    (bp.items || []).forEach(
                                        function (item, i) {
                                            var bid = fid("tb");
                                            codeLines.push(
                                                fieldJSON(item, bid) +
                                                    (i < bp.items.length - 1
                                                        ? ","
                                                        : ""),
                                            );
                                            var card =
                                                '<div class="bp-card ' +
                                                (item.kind || "") +
                                                '"><span class="bp-kind-badge ' +
                                                (item.kind || "") +
                                                '">' +
                                                esc(item.kind) +
                                                '</span><span class="bp-category">' +
                                                esc(item.category) +
                                                "</span>" +
                                                '<div style="margin-top:6px">' +
                                                esc(item.guidance) +
                                                '</div><div class="rationale">' +
                                                esc(item.rationale) +
                                                "</div></div>";
                                            rCards += rfDiv(bid, card);
                                        },
                                    );
                                    codeLines.push(synHL("]"));
                                    html += sectionPair(
                                        "best-practices",
                                        "Best Practices",
                                        codeLines.join("\n"),
                                        "<h2>Best Practices</h2>" + rCards,
                                    );
                                })();

                            /* ── Accessibility ────────────────────────────────── */
                            if (gMap.accessibility)
                                (function () {
                                    var a11y = gMap.accessibility;
                                    var f_wcag = fid("ta1"),
                                        f_cc = [];
                                    var codeLines = [
                                        fieldJSON(
                                            { wcagLevel: a11y.wcagLevel },
                                            f_wcag,
                                        ) + ",",
                                    ];
                                    if (a11y.colorContrast) {
                                        codeLines.push(
                                            synHL('"colorContrast": ['),
                                        );
                                        a11y.colorContrast.forEach(
                                            function (c, i) {
                                                var cid = fid("tac");
                                                f_cc.push({ id: cid, cc: c });
                                                codeLines.push(
                                                    fieldJSON(c, cid) +
                                                        (i <
                                                        a11y.colorContrast
                                                            .length -
                                                            1
                                                            ? ","
                                                            : ""),
                                                );
                                            },
                                        );
                                        codeLines.push(synHL("]"));
                                    }
                                    var r =
                                        "<h2>Accessibility</h2>" +
                                        rfDiv(
                                            f_wcag,
                                            '<div class="wcag-badge">WCAG ' +
                                                esc(a11y.wcagLevel) +
                                                "</div>",
                                        );
                                    if (f_cc.length) {
                                        r +=
                                            "<h3>Color Contrast</h3>" +
                                            '<table class="data-table"><thead><tr><th>FG</th><th>BG</th><th>Ratio</th><th>Level</th><th>Context</th></tr></thead><tbody>' +
                                            f_cc
                                                .map(function (fc) {
                                                    var c = fc.cc;
                                                    return (
                                                        '<tr class="rf" data-field="' +
                                                        fc.id +
                                                        '"><td><code>' +
                                                        esc(c.foreground) +
                                                        "</code></td><td><code>" +
                                                        esc(c.background) +
                                                        "</code></td><td>" +
                                                        c.contrastRatio +
                                                        ':1</td><td><span class="badge badge-stable">' +
                                                        esc(c.level) +
                                                        "</span></td><td>" +
                                                        esc(c.context) +
                                                        "</td></tr>"
                                                    );
                                                })
                                                .join("") +
                                            "</tbody></table>";
                                    }
                                    html += sectionPair(
                                        "accessibility",
                                        "Accessibility",
                                        codeLines.join("\n"),
                                        r,
                                    );
                                })();

                            /* ── Links ─────────────────────────────────────────── */
                            if (data.links && data.links.length)
                                (function () {
                                    var codeLines = [synHL("[")];
                                    var rGroups = {};
                                    data.links.forEach(function (l, i) {
                                        var lid = fid("tl");
                                        codeLines.push(
                                            fieldJSON(l, lid) +
                                                (i < data.links.length - 1
                                                    ? ","
                                                    : ""),
                                        );
                                        if (!rGroups[l.kind])
                                            rGroups[l.kind] = [];
                                        rGroups[l.kind].push({
                                            id: lid,
                                            link: l,
                                        });
                                    });
                                    codeLines.push(synHL("]"));
                                    var r = "<h2>Links</h2>";
                                    Object.keys(rGroups).forEach(
                                        function (kind) {
                                            r +=
                                                '<div class="link-group"><div class="link-group-label">' +
                                                esc(kind) +
                                                "</div>";
                                            rGroups[kind].forEach(
                                                function (fl) {
                                                    r += rfDiv(
                                                        fl.id,
                                                        '<div class="link-item"><span class="link-icon">' +
                                                            (LINK_ICONS[kind] ||
                                                                "\uD83D\uDD17") +
                                                            '</span><a href="' +
                                                            esc(fl.link.url) +
                                                            '" target="_blank">' +
                                                            esc(fl.link.label) +
                                                            "</a></div>",
                                                    );
                                                },
                                            );
                                            r += "</div>";
                                        },
                                    );
                                    html += sectionPair(
                                        "links",
                                        "Links",
                                        codeLines.join("\n"),
                                        r,
                                    );
                                })();

                            return html;
                        }

                        /* ═══════════════════════════════════════════════════════
            INITIALIZATION
            ═══════════════════════════════════════════════════════ */
                        /* Data-driven initialization from build script registry */
                        var SAMPLES = [
                            { id: "component", key: "component" },
                            { id: "token", key: "token" },
                            { id: "pattern", key: "pattern" },
                            { id: "style", key: "style" },
                            { id: "theme", key: "theme" },
                        ];
                        SAMPLES.forEach(function (sample) {
                            var el = document.getElementById(
                                sample.id + "-data",
                            );
                            if (!el) return;
                            var data = JSON.parse(el.textContent);
                            var kind = data.kind || sample.key;
                            /* Pick renderer by entity kind */
                            var renderer =
                                kind === "token" || kind === "theme"
                                    ? renderToken
                                    : renderComponent;
                            var target = document.getElementById(
                                "tab-" + sample.id,
                            );
                            if (target) target.innerHTML = renderer(data);
                        });

                        /* ── Tab switching ──────────────────────────────────── */
                        $$(".tab-btn").forEach(function (btn) {
                            btn.addEventListener("click", function () {
                                $$(".tab-btn").forEach(function (b) {
                                    b.classList.remove("active");
                                });
                                $$(".tab-content").forEach(function (c) {
                                    c.classList.remove("active");
                                });
                                btn.classList.add("active");
                                document
                                    .getElementById(
                                        "tab-" + btn.getAttribute("data-tab"),
                                    )
                                    .classList.add("active");
                            });
                        });

                        /* ── No JS height sync needed — code column is position:absolute
                             with height:100%, so it inherits the height of .section-pair
                             which is driven entirely by .col-rendered (the only
                             in-flow child). ── */

                        /* ── Element-level hover highlighting ──────────────── */
                        var currentHL = null;

                        function clearIndicators() {
                            $$(".offscreen-indicator.visible").forEach(
                                function (ind) {
                                    ind.classList.remove("visible");
                                },
                            );
                        }

                        /**
                         * Check if a highlighted code-side element is scrolled out of
                         * view in its .col-code container. If so, show the appropriate
                         * sticky indicator (above or below).
                         */
                        function updateIndicators(fieldId) {
                            clearIndicators();
                            if (!fieldId) return;

                            /* Find the code-side highlighted spans */
                            var codeEls = $$(
                                'span[data-field="' + fieldId + '"]',
                            );
                            if (!codeEls.length) return;

                            /* The first code-side span determines the scroll container */
                            var codeEl = codeEls[0];
                            var colCode = codeEl.closest(".col-code");
                            if (!colCode) return;
                            var wrap = colCode.closest(".col-code-wrap");
                            if (!wrap) return;

                            var containerRect = colCode.getBoundingClientRect();
                            var elRect = codeEl.getBoundingClientRect();

                            if (elRect.bottom < containerRect.top + 1) {
                                /* Element is above the visible area */
                                var indAbove = wrap.querySelector(
                                    ".offscreen-indicator.above",
                                );
                                if (indAbove) indAbove.classList.add("visible");
                            } else if (elRect.top > containerRect.bottom - 1) {
                                /* Element is below the visible area */
                                var indBelow = wrap.querySelector(
                                    ".offscreen-indicator.below",
                                );
                                if (indBelow) indBelow.classList.add("visible");
                            }
                        }

                        document.addEventListener("mouseover", function (e) {
                            var el = e.target.closest("[data-field]");
                            if (!el) return;
                            var fld = el.getAttribute("data-field");
                            if (fld === currentHL) return;
                            // Clear previous
                            if (currentHL)
                                $$('[data-field="' + currentHL + '"]').forEach(
                                    function (s) {
                                        s.classList.remove("hl");
                                    },
                                );
                            currentHL = fld;
                            $$('[data-field="' + fld + '"]').forEach(
                                function (s) {
                                    s.classList.add("hl");
                                },
                            );
                            updateIndicators(fld);
                        });

                        document.addEventListener("mouseout", function (e) {
                            var related = e.relatedTarget;
                            if (related) {
                                var next = related.closest
                                    ? related.closest("[data-field]")
                                    : null;
                                if (
                                    next &&
                                    next.getAttribute("data-field") ===
                                        currentHL
                                )
                                    return;
                            }
                            if (currentHL) {
                                $$('[data-field="' + currentHL + '"]').forEach(
                                    function (s) {
                                        s.classList.remove("hl");
                                    },
                                );
                                currentHL = null;
                                clearIndicators();
                            }
                        });

                        /* Click an indicator to scroll the highlighted code into view */
                        document.addEventListener("click", function (e) {
                            var ind = e.target.closest(".offscreen-indicator");
                            if (!ind || !currentHL) return;
                            var wrap = ind.closest(".col-code-wrap");
                            if (!wrap) return;
                            var colCode = wrap.querySelector(".col-code");
                            if (!colCode) return;
                            var target = colCode.querySelector(
                                'span[data-field="' + currentHL + '"]',
                            );
                            if (!target) return;
                            target.scrollIntoView({
                                block: "center",
                                behavior: "smooth",
                            });
                            setTimeout(function () {
                                clearIndicators();
                            }, 350);
                        });

                        /* Update indicators when the code column is scrolled */
                        document.addEventListener(
                            "scroll",
                            function () {
                                if (currentHL) updateIndicators(currentHL);
                            },
                            true,
                        );
                    })();
                </script>
            </main>
        </div>
    </body>
</html>
