<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta

        />
        <link rel="canonical" href="https://designsystemdocspec.org/samples" />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <meta property="og:type" content="website" />
        <meta
            property="og:site_name"
            content="Design System Documentation Spec"
        />
        <meta
            property="og:title"
            content="Interactive samples — DSDS {{VERSION}}"
        />
        <meta
            property="og:description"
            content="Interactive, rendered samples of DSDS entities — a component, token, pattern, foundation, and theme — built from the spec's own example files."
        />
        <meta
            property="og:url"
            content="https://designsystemdocspec.org/samples"

    </head>
    <body>
        <a class="skip-link" href="#main-content">Skip to content</a>
        {{NAV}}
        <div class="content content--wide">
            <main class="content__main" id="main-content" role="main">
                <div class="samples-header">
                    <ds-toolbar sticky>
                        <span
                            slot="start"
                            style="font-weight: 700; font-size: 1.1rem"
                            >Interactive samples</span
                        >
                        <span
                            style="
                                font-size: 0.88rem;
                                color: var(--color-text-secondary, #555);
                            "
                            >Hover over any element to highlight its JSON
                            counterpart.</span
                        >
                        <span slot="end"><ds-badge>v{{VERSION}}</ds-badge></span>
                    </ds-toolbar>
                    <ds-tabs target="#sample-panels"></ds-tabs>
                </div>

                <div class="content__inner" style="padding-top: 88px">
                    <div id="sample-panels">{{TAB_CONTENTS}}</div>

                    <ds-back-to-top></ds-back-to-top>
                    <ds-footer>
                        <p>
                            Design System Documentation Spec (DSDS) {{VERSION}} —
                            Interactive samples
                        </p>
                        <p>
                            <a
                                href="https://github.com/somerandomdude/design-system-documentation-schema"
                                >GitHub</a
                            >
                            · <a href="index.html">Full spec</a> ·
                            <a href="quickstart.html">Quick start</a>
                        </p>
                    </ds-footer>
                </div>
            </main>
        </div>

        <script>
            (function () {
                "use strict";

                function $$(selector, context) {
                    return Array.prototype.slice.call(
                        (context || document).querySelectorAll(selector),
                    );
                }

                /* ── Field-level hover highlighting ───────────────── */

                var currentHL = null;

                function clearIndicators() {
                    $$(".offscreen-indicator.visible").forEach(function (el) {
                        el.classList.remove("visible");
                    });
                }

                function updateIndicators(fieldId) {
                    clearIndicators();
                    if (!fieldId) return;

                    var codeEls = $$('span[data-field="' + fieldId + '"]');
                    if (!codeEls.length) return;

                    var codeEl = codeEls[0];
                    var colCode = codeEl.closest(".col-code");
                    if (!colCode) return;
                    var wrap = colCode.closest(".col-code-wrap");
                    if (!wrap) return;

                    var containerRect = colCode.getBoundingClientRect();
                    var elRect = codeEl.getBoundingClientRect();

                    if (elRect.bottom < containerRect.top + 1) {
                        var above = wrap.querySelector(
                            ".offscreen-indicator.above",
                        );
                        if (above) above.classList.add("visible");
                    } else if (elRect.top > containerRect.bottom - 1) {
                        var below = wrap.querySelector(
                            ".offscreen-indicator.below",
                        );
                        if (below) below.classList.add("visible");
                    }
                }

                document.addEventListener("mouseover", function (e) {
                    var el = e.target.closest("[data-field]");
                    if (!el) return;
                    var fld = el.getAttribute("data-field");
                    if (fld === currentHL) return;

                    if (currentHL) {
                        $$('[data-field="' + currentHL + '"]').forEach(
                            function (s) {
                                s.classList.remove("hl");
                            },
                        );
                    }
                    currentHL = fld;
                    $$('[data-field="' + fld + '"]').forEach(function (s) {
                        s.classList.add("hl");
                    });
                    updateIndicators(fld);
                });

                document.addEventListener("mouseout", function (e) {
                    var related = e.relatedTarget;
                    if (related) {
                        var next = related.closest
                            ? related.closest("[data-field]")
                            : null;
                        if (
                            next &&
                            next.getAttribute("data-field") === currentHL
                        )
                            return;
                    }
                    if (currentHL) {
                        $$('[data-field="' + currentHL + '"]').forEach(
                            function (s) {
                                s.classList.remove("hl");
                            },
                        );
                        currentHL = null;
                        clearIndicators();
                    }
                });

                /* Click an indicator to scroll highlighted code into view */
                document.addEventListener("click", function (e) {
                    var ind = e.target.closest(".offscreen-indicator");
                    if (!ind || !currentHL) return;
                    var wrap = ind.closest(".col-code-wrap");
                    if (!wrap) return;
                    var colCode = wrap.querySelector(".col-code");
                    if (!colCode) return;
                    var target = colCode.querySelector(
                        'span[data-field="' + currentHL + '"]',
                    );
                    if (!target) return;
                    target.scrollIntoView({
                        block: "center",
                        behavior: "smooth",
                    });
                    setTimeout(clearIndicators, 350);
                });

                /* Update indicators on scroll */
                document.addEventListener(
                    "scroll",
                    function () {
                        if (currentHL) updateIndicators(currentHL);
                    },
                    true,
                );
            })();
        </script>
    </body>
</html>
