<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DSDS Sample Documentation</title>
        <link rel="stylesheet" href="tokens.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="components.js"></script>
        <style>
            /* ═══════════════════════════════════════════════════════
               Samples page — layout and interactive highlighting
               These styles are specific to the side-by-side
               JSON ↔ rendered documentation viewer.
               ═══════════════════════════════════════════════════════ */

            /* Tab bar */
            .tab-bar {
                display: flex;
                gap: 0;
                background: var(--ds-color-bg);
                border-bottom: var(--ds-border-width-md) solid
                    var(--ds-color-border);
                padding: 0 var(--ds-space-8);
                overflow-x: auto;
            }
            .tab-btn {
                font-family: var(--ds-font-body);
                padding: var(--ds-space-3) var(--ds-space-6);
                border: none;
                background: none;
                font-size: var(--ds-font-size-md);
                font-weight: var(--ds-font-weight-semibold);
                color: var(--ds-color-text-secondary);
                cursor: pointer;
                border-bottom: var(--ds-border-width-lg) solid transparent;
                margin-bottom: -2px;
                transition:
                    color var(--ds-transition-normal),
                    border-color var(--ds-transition-normal);
                white-space: nowrap;
            }
            .tab-btn:hover {
                color: var(--ds-color-text);
            }
            .tab-btn.active {
                color: var(--ds-color-accent);
                border-bottom-color: var(--ds-color-accent);
            }
            .tab-content {
                display: none;
                padding: var(--ds-space-6) var(--ds-space-8);
                max-width: var(--ds-width-wide);
                margin: 0 auto;
            }
            .tab-content.active {
                display: block;
            }

            /* Section pair — side-by-side code + rendered */
            .section-pair {
                position: relative;
                margin-bottom: var(--ds-space-6);
                border: var(--ds-border-width-sm) solid var(--ds-color-border);
                border-radius: var(--ds-radius-lg);
                overflow: hidden;
            }
            .col-code-wrap {
                position: absolute;
                top: 0;
                left: 0;
                width: 50%;
                height: 100%;
            }
            .col-code {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--ds-color-bg);
                overflow: auto;
            }
            .col-rendered {
                width: 50%;
                margin-left: 50%;
                background: var(--ds-color-bg-subtle);
                border-left: var(--ds-border-width-sm) solid
                    var(--ds-color-border);
            }
            .section-panel {
                border-left: var(--ds-border-width-xl) solid transparent;
                padding: var(--ds-space-4) var(--ds-space-5);
            }

            /* Off-screen highlight indicators */
            .offscreen-indicator {
                position: absolute;
                left: 0;
                right: 0;
                z-index: 10;
                display: none;
                align-items: center;
                justify-content: center;
                gap: var(--ds-space-2);
                padding: var(--ds-space-1) var(--ds-space-3);
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-semibold);
                letter-spacing: var(--ds-tracking-normal);
                color: var(--ds-color-info-text);
                background: var(--ds-color-info-bg);
                cursor: pointer;
                user-select: none;
                pointer-events: auto;
            }
            .offscreen-indicator.above {
                top: 0;
                border-bottom: var(--ds-border-width-sm) solid #93c5fd;
            }
            .offscreen-indicator.below {
                bottom: 0;
                border-top: var(--ds-border-width-sm) solid #93c5fd;
            }
            .offscreen-indicator.visible {
                display: flex;
            }
            .offscreen-indicator .arrow {
                font-size: var(--ds-font-size-md);
            }

            /* Section label */
            .section-label {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                color: #444;
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-wide);
                padding: var(--ds-space-1) 0 var(--ds-space-2);
                margin: 0;
            }

            /* JSON code */
            pre.json-code {
                margin: 0;
                padding: 0;
                font-family: var(--ds-font-mono);
                font-size: 12px;
                line-height: var(--ds-line-height-loose);
                white-space: pre;
                overflow-x: auto;
                background: none;
                border: none;
                border-radius: 0;
            }
            .json-key {
                color: var(--ds-syntax-light-key);
            }
            .json-string {
                color: var(--ds-syntax-light-string);
            }
            .json-number {
                color: var(--ds-syntax-light-number);
            }
            .json-bool {
                color: var(--ds-syntax-light-bool);
            }
            .json-null {
                color: var(--ds-syntax-light-bool);
            }

            /* Field-level hover highlighting */
            span[data-field] {
                transition: background-color var(--ds-transition-fast);
                border-radius: var(--ds-radius-sm);
            }
            span[data-field].hl {
                background-color: var(--ds-color-info-bg);
            }
            .rf {
                transition: outline-color var(--ds-transition-fast);
                border-radius: var(--ds-radius-sm);
                outline: var(--ds-border-width-sm) solid transparent;
                outline-offset: 1px;
            }
            .rf.hl {
                outline-color: #60a5fa;
            }

            /* Rendered section typography */
            .rendered-section h2 {
                margin: 0 0 var(--ds-space-3);
                font-weight: var(--ds-font-weight-bold);
                color: var(--ds-color-text);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-normal);
                font-size: var(--ds-font-size-base);
                border-bottom: none;
                padding-bottom: 0;
            }
            .rendered-section h3 {
                margin: var(--ds-space-4) 0 var(--ds-space-2);
                font-size: var(--ds-font-size-lg);
                font-weight: var(--ds-font-weight-semibold);
            }
            .rendered-section p {
                margin: 0 0 var(--ds-space-2);
                font-size: var(--ds-font-size-md);
                color: #444;
            }

            /* Entity header */
            .entity-header h1 {
                margin: 0 0 var(--ds-space-2);
                font-size: 1.6rem;
                font-weight: var(--ds-font-weight-extrabold);
                border-bottom: none;
                padding-bottom: 0;
            }
            .entity-header .summary {
                font-size: var(--ds-font-size-xl);
                color: var(--ds-color-text-secondary);
                margin: 0 0 var(--ds-space-2);
            }
            .entity-header .description {
                font-size: var(--ds-font-size-md);
                color: #666;
                margin: 0 0 var(--ds-space-3);
                line-height: var(--ds-line-height-relaxed);
            }

            /* Badge variants for rendered output */
            .badge-stable {
                background: var(--ds-color-success-bg);
                color: var(--ds-color-success-text);
            }
            .badge-experimental {
                background: var(--ds-color-warning-bg);
                color: var(--ds-color-warning-text);
            }
            .badge-draft {
                background: var(--ds-color-neutral-bg);
                color: var(--ds-color-neutral-text);
            }
            .badge-deprecated {
                background: var(--ds-color-danger-bg);
                color: var(--ds-color-danger-text);
            }
            .badge-kind {
                background: var(--ds-color-info-bg);
                color: var(--ds-color-info-text);
            }
            .badge-category {
                background: var(--ds-color-purple-bg);
                color: var(--ds-color-purple-text);
            }
            .badge-token-type {
                background: var(--ds-color-indigo-bg);
                color: var(--ds-color-indigo-text);
            }

            /* Tags */
            .tag-list {
                display: flex;
                flex-wrap: wrap;
                gap: var(--ds-space-2);
                margin: var(--ds-space-2) 0;
            }
            .tag {
                display: inline-block;
                padding: var(--ds-space-1) var(--ds-space-2);
                background: var(--ds-color-bg-muted);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-md);
                font-size: var(--ds-font-size-sm);
                font-family: var(--ds-font-mono);
                color: var(--ds-color-text-secondary);
            }

            /* Meta row */
            .meta-row {
                display: flex;
                flex-wrap: wrap;
                gap: var(--ds-space-4);
                margin: var(--ds-space-2) 0;
                font-size: var(--ds-font-size-base);
                color: #666;
            }
            .meta-row strong {
                color: #444;
            }

            /* Platform / data tables */
            .platform-table,
            .data-table {
                width: 100%;
                border-collapse: collapse;
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }
            .platform-table th,
            .platform-table td,
            .data-table th,
            .data-table td {
                text-align: left;
                padding: var(--ds-space-2) var(--ds-space-3);
                border-bottom: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                vertical-align: top;
            }
            .platform-table th,
            .data-table th {
                font-weight: var(--ds-font-weight-semibold);
                color: var(--ds-color-text-secondary);
                background: var(--ds-color-bg-subtle);
                white-space: nowrap;
            }
            .data-table td code {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-sm);
                background: var(--ds-color-bg-muted);
                padding: 1px 5px;
                border-radius: var(--ds-radius-sm);
            }

            /* Use case cards */
            .use-case {
                display: flex;
                gap: var(--ds-space-3);
                padding: var(--ds-space-3);
                margin-bottom: var(--ds-space-2);
                border-radius: var(--ds-radius-lg);
                font-size: var(--ds-font-size-md);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                background: var(--ds-color-bg);
            }
            .use-case.positive {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-success-text);
            }
            .use-case.negative {
                border-left: var(--ds-border-width-xl) solid #ef5350;
            }
            .use-case-badge {
                flex-shrink: 0;
                width: 22px;
                height: 22px;
                border-radius: var(--ds-radius-full);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-extrabold);
                color: var(--ds-color-bg);
            }
            .use-case.positive .use-case-badge {
                background: var(--ds-color-success-text);
            }
            .use-case.negative .use-case-badge {
                background: #ef5350;
            }
            .alternative-note {
                margin-top: var(--ds-space-2);
                font-size: var(--ds-font-size-sm);
                color: #777;
                padding-left: var(--ds-space-3);
                border-left: var(--ds-border-width-md) solid
                    var(--ds-color-border-light);
            }
            .alternative-note strong {
                color: var(--ds-color-text-secondary);
            }

            /* Best practice cards */
            .bp-card {
                padding: var(--ds-space-3) var(--ds-space-4);
                border-radius: var(--ds-radius-lg);
                margin-bottom: var(--ds-space-3);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                background: var(--ds-color-bg);
                font-size: var(--ds-font-size-md);
            }
            .bp-card.required {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-info-text);
            }
            .bp-card.encouraged {
                border-left: var(--ds-border-width-xl) solid
                    var(--ds-color-success-text);
            }
            .bp-card.prohibited {
                border-left: var(--ds-border-width-xl) solid #ef5350;
            }
            .bp-card.informational {
                border-left: var(--ds-border-width-xl) solid #9e9e9e;
            }
            .bp-kind-badge {
                display: inline-block;
                font-size: var(--ds-font-size-xs);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                padding: var(--ds-space-1) 7px;
                border-radius: var(--ds-radius-sm);
                margin-right: var(--ds-space-2);
                margin-bottom: var(--ds-space-1);
            }
            .bp-kind-badge.required {
                background: var(--ds-color-required-bg);
                color: var(--ds-color-required-text);
            }
            .bp-kind-badge.encouraged {
                background: var(--ds-color-encouraged-bg);
                color: var(--ds-color-encouraged-text);
            }
            .bp-kind-badge.prohibited {
                background: var(--ds-color-prohibited-bg);
                color: var(--ds-color-prohibited-text);
            }
            .bp-kind-badge.informational {
                background: var(--ds-color-neutral-bg);
                color: #424242;
            }
            .bp-category {
                display: inline-block;
                font-size: var(--ds-font-size-xs);
                padding: var(--ds-space-1) 7px;
                border-radius: var(--ds-radius-sm);
                background: var(--ds-color-bg-muted);
                color: #666;
                margin-bottom: var(--ds-space-2);
            }
            .bp-card .rationale {
                margin-top: var(--ds-space-2);
                font-size: var(--ds-font-size-sm);
                color: #777;
                font-style: italic;
            }

            /* WCAG badge */
            .wcag-badge {
                display: inline-block;
                padding: var(--ds-space-1) var(--ds-space-3);
                border-radius: var(--ds-radius-md);
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                background: #e8f5e9;
                color: var(--ds-color-success-text);
                margin-bottom: var(--ds-space-3);
            }

            /* Color swatch + value display */
            .color-swatch {
                display: inline-block;
                width: 32px;
                height: 32px;
                border-radius: var(--ds-radius-lg);
                border: var(--ds-border-width-sm) solid #ccc;
                vertical-align: middle;
                margin-right: var(--ds-space-2);
            }
            .value-display {
                display: flex;
                align-items: center;
                gap: var(--ds-space-3);
                padding: var(--ds-space-3) var(--ds-space-4);
                background: var(--ds-color-bg);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
                margin: var(--ds-space-2) 0;
            }
            .value-display code {
                font-family: var(--ds-font-mono);
                font-size: var(--ds-font-size-md);
                font-weight: var(--ds-font-weight-semibold);
            }
            .value-meta {
                font-size: var(--ds-font-size-sm);
                color: #777;
            }

            /* Link groups */
            .link-group {
                margin-bottom: var(--ds-space-3);
            }
            .link-group-label {
                font-size: var(--ds-font-size-sm);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-wide);
                color: var(--ds-color-text-muted);
                margin-bottom: var(--ds-space-1);
            }
            .link-item {
                display: flex;
                align-items: center;
                gap: var(--ds-space-2);
                padding: var(--ds-space-2) 0;
                font-size: var(--ds-font-size-md);
            }
            .link-item a {
                color: var(--ds-color-accent);
                text-decoration: none;
            }
            .link-item a:hover {
                text-decoration: underline;
            }
            .link-icon {
                font-size: var(--ds-font-size-md);
                width: var(--ds-space-5);
                text-align: center;
            }

            /* Token map */
            .token-map {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--ds-space-1) var(--ds-space-4);
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }
            .token-map-entry {
                font-family: var(--ds-font-mono);
                padding: var(--ds-space-1) 0;
                color: var(--ds-color-text-secondary);
            }

            /* Spec grid */
            .spec-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--ds-space-4);
                margin: var(--ds-space-2) 0;
            }
            .spec-box {
                padding: var(--ds-space-3);
                background: var(--ds-color-bg);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
            }
            .spec-box h4 {
                margin: 0 0 var(--ds-space-2);
                font-size: var(--ds-font-size-base);
                font-weight: var(--ds-font-weight-bold);
                text-transform: uppercase;
                letter-spacing: var(--ds-tracking-normal);
                color: var(--ds-color-text-muted);
            }
            .spec-entry {
                display: flex;
                justify-content: space-between;
                font-size: var(--ds-font-size-base);
                padding: var(--ds-space-1) 0;
                border-bottom: var(--ds-border-width-sm) solid
                    var(--ds-color-bg-subtle);
            }
            .spec-entry-key {
                color: var(--ds-color-text-secondary);
            }
            .spec-entry-val {
                font-family: var(--ds-font-mono);
                color: var(--ds-syntax-light-key);
                font-size: var(--ds-font-size-sm);
            }

            /* Variant card */
            .variant-card {
                padding: var(--ds-space-3);
                margin-bottom: var(--ds-space-2);
                border: var(--ds-border-width-sm) solid
                    var(--ds-color-border-light);
                border-radius: var(--ds-radius-lg);
                background: var(--ds-color-bg);
            }
            .variant-card h4 {
                margin: 0 0 var(--ds-space-1);
                font-size: var(--ds-font-size-md);
            }
            .variant-card p {
                margin: 0;
                font-size: var(--ds-font-size-base);
                color: var(--ds-color-text-secondary);
            }

            /* Preview placeholder */
            .preview-placeholder {
                background: var(--ds-color-bg-muted);
                border: var(--ds-border-width-md) dashed var(--ds-color-border);
                border-radius: var(--ds-radius-lg);
                padding: var(--ds-space-6);
                text-align: center;
                color: var(--ds-color-text-muted);
                font-size: var(--ds-font-size-base);
                margin: var(--ds-space-2) 0;
            }

            /* Responsive */
            @media (max-width: 960px) {
                .section-pair {
                    position: static;
                }
                .col-code-wrap {
                    position: static;
                    width: 100%;
                    height: auto;
                }
                .col-code {
                    position: static;
                    width: 100%;
                    height: auto !important;
                    max-height: 400px;
                }
                .col-rendered {
                    width: 100%;
                    margin-left: 0;
                    border-left: none;
                    border-top: var(--ds-border-width-sm) solid
                        var(--ds-color-border);
                }
                .tab-content {
                    padding: var(--ds-space-4);
                }
                .spec-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        {{NAV}}
        <div class="content content--wide">
            <main class="content__main" role="main">
                <ds-toolbar sticky>
                    <span
                        slot="start"
                        style="font-weight: 700; font-size: 1.1rem"
                        >DSDS Sample Documentation</span
                    >
                    <span
                        style="
                            font-size: 0.88rem;
                            color: var(--color-text-secondary, #555);
                        "
                        >Hover over any element to highlight its JSON
                        counterpart.</span
                    >
                    <span slot="end"><ds-badge>v0.1</ds-badge></span>
                </ds-toolbar>

                <div class="tab-bar">{{TAB_BUTTONS}}</div>

                <div class="content__inner">
                    {{TAB_CONTENTS}} {{DATA_SCRIPTS}}

                    <script>
                               (function () {
                                   "use strict";

                                   /* ── Helpers ─────────────────────────────────────────── */
                                   var $$ = function (s, c) {
                                       return Array.prototype.slice.call(
                                           (c || document).querySelectorAll(s),
                                       );
                                   };

                                   function esc(s) {
                                       if (s == null) return "";
                                       return String(s)
                                           .replace(/&/g, "&amp;")
                                           .replace(/</g, "&lt;")
                                           .replace(/>/g, "&gt;")
                                           .replace(/"/g, "&quot;");
                                   }

                                   var SECTION_COLORS = {
                                       header: "#4A4A4A",
                                       anatomy: "#E57373",
                                       api: "#64B5F6",
                                       variants: "#81C784",
                                       states: "#FFB74D",
                                       "design-specifications": "#BA68C8",
                                       purpose: "#4DB6AC",
                                       "best-practices": "#FF8A65",
                                       accessibility: "#A1887F",
                                       links: "#90A4AE",
                                       value: "#7986CB",
                                       "token-api": "#7986CB",
                                   };

                                   function secStyle(n) {
                                       return "border-left-color:" + (SECTION_COLORS[n] || "#ccc");
                                   }

                                   var LINK_ICONS = {
                                       source: "\uD83D\uDCC4",
                                       design: "\uD83C\uDFA8",
                                       storybook: "\uD83D\uDCD6",
                                       package: "\uD83D\uDCE6",
                                       alternative: "\u2194",
                                       child: "\u2198",
                                       parent: "\u2196",
                                       documentation: "\uD83D\uDCDD",
                                       related: "\uD83D\uDD17",
                                   };

                                   /* ── Unique field id counter ────────────────────────── */
                                   var _fid = 0;
                                   function fid(prefix) {
                                       return prefix + "-" + ++_fid;
                                   }

                                   /* ── Syntax highlight a JSON string ─────────────────── */
                                   function synHL(json) {
                                       if (typeof json !== "string")
                                           json = JSON.stringify(json, null, 2);
                                       json = esc(json);
                                       return json.replace(
                                           /(&quot;(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\&])*?&quot;)(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?/g,
                                           function (m) {
                                               var c = "json-number";
                                               if (/^&quot;/.test(m)) {
                                                   c = /:$/.test(m) ? "json-key" : "json-string";
                                               } else if (/true|false/.test(m)) {
                                                   c = "json-bool";
                                               } else if (/null/.test(m)) {
                                                   c = "json-null";
                                               }
                                               return '<span class="' + c + '">' + m + "</span>";
                                           },
                                       );
                                   }

                                   /* ── Wrap a JSON fragment with a data-field span ────── */
                                   /* Returns highlighted JSON lines with the specified field id wrapping each line */
                                   function fieldJSON(obj, fieldId) {
                                       var raw = JSON.stringify(obj, null, 2);
                                       var lines = raw.split("\n");
                                       var out = [];
                                       for (var i = 0; i < lines.length; i++) {
                                           out.push(
                                               '<span data-field="' +
                                                   fieldId +
                                                   '">' +
                                                   synHL(lines[i]) +
                                                   "</span>",
                                           );
                                       }
                                       return out.join("\n");
                                   }

                                   /* ── Wrap a rendered element with a data-field span ─── */
                                   function rf(fieldId, html) {
                                       return (
                                           '<span class="rf" data-field="' +
                                           fieldId +
                                           '">' +
                                           html +
                                           "</span>"
                                       );
                                   }
                                   /* Block-level version */
                                   function rfDiv(fieldId, html) {
                                       return (
                                           '<div class="rf" data-field="' +
                                           fieldId +
                                           '">' +
                                           html +
                                           "</div>"
                                       );
                                   }

                                   function statusBadge(s) {
                                       var v = s || "draft";
                                       return '<ds-badge variant="' + esc(v) + '" size="sm">' + esc(v) + "</ds-badge>";
                                   }

                                   /**
                                    * Normalize status: can be a string ("stable") or an
                                    * object ({ overall, platforms }). Always returns
                                    * { overall: string, platforms: object|null }.
                                    */
                                   function normalizeStatus(raw) {
                                       if (!raw) return { overall: "draft", platforms: null };
                                       if (typeof raw === "string") return { overall: raw, platforms: null };
                                       return {
                                           overall: raw.overall || "draft",
                                           platforms: raw.platforms || null,
                                       };
                                   }

                                   function renderStatusHTML(status, includePlatformNote) {
                                       var s = normalizeStatus(status);
                                       var html = "<div>" + statusBadge(s.overall) + "</div>";
                                       if (s.platforms) {
                                           var noteCol = includePlatformNote ? "<th>Note</th>" : "";
                                           html += '<table class="platform-table"><thead><tr><th>Platform</th><th>Status</th><th>Since</th>' + noteCol + '</tr></thead><tbody>';
                                           Object.keys(s.platforms).forEach(function (p) {
                                               var pl = s.platforms[p];
                                               var noteCell = includePlatformNote
                                                   ? '<td style="font-size:0.78rem;color:#888">' + esc(pl.description || "") + "</td>"
                                                   : "";
                                               html += "<tr><td>" + esc(p) + "</td><td>" + statusBadge(pl.status) + "</td><td>" + esc(pl.since || "\u2014") + "</td>" + noteCell + "</tr>";
                                           });
                                           html += "</tbody></table>";
                                       }
                                       return html;
                                   }

                                   /* ── Build a complete section pair ──────────────────── */
                                   function sectionPair(
                                       sectionName,
                                       label,
                                       codeHTML,
                                       renderedHTML,
                                   ) {
                                       return (
                                           '<div class="section-pair">' +
                                           '<div class="col-code-wrap">' +
                                           '<div class="col-code">' +
                                           '<div class="section-panel" style="' +
                                           secStyle(sectionName) +
                                           '">' +
                                           '<p class="section-label">' +
                                           esc(label) +
                                           "</p>" +
                                           '<pre class="json-code">' +
                                           codeHTML +
                                           "</pre>" +
                                           "</div>" +
                                           "</div>" +
                                           '<div class="offscreen-indicator above" data-dir="above"><span class="arrow">\u2191</span> Highlighted code above</div>' +
                                           '<div class="offscreen-indicator below" data-dir="below"><span class="arrow">\u2193</span> Highlighted code below</div>' +
                                           "</div>" +
                                           '<div class="col-rendered"><div class="section-panel rendered-section" style="' +
                                           secStyle(sectionName) +
                                           '">' +
                                           renderedHTML +
                                           "</div></div></div>"
                                       );
                                   }

                                   /* ═══════════════════════════════════════════════════════
                        COMPONENT RENDERER
                        ═══════════════════════════════════════════════════════ */
                                   function renderComponent(data) {

                                               f_cat = fid("h"),

                                               "</div>";

                                       })();

                                       /* ── Anatomy ──────────────────────────────────────── */
                                       if (gMap.anatomy)
                                           (function () {

                                       /* ── API ──────────────────────────────────────────── */
                                       if (gMap.api)

                                               var r =
                                                   "<h2>API</h2><h3>Properties</h3>" +
                                                   '<table class="data-table"><thead><tr><th>Name</th><th>Type</th><th>Default</th><th>Description</th></tr></thead><tbody>' +
                                                   f_props

                                                           return (
                                                               '<tr class="rf" data-field="' +

                                               if (f_events.length) {

                                                       "<h3>Events</h3>" +
                                                       '<table class="data-table"><thead><tr><th>Name</th><th>Payload</th><th>Description</th></tr></thead><tbody>' +
                                                       f_events
                                                           .map(function (fe) {
                                                               var e = fe.ev;
                                                               return (
                                                                   '<tr class="rf" data-field="' +
                                                                   fe.id +
                                                                   '"><td><code>' +
                                                                   esc(e.name) +
                                                                   "</code></td><td><code>" +
                                                                   esc(e.payload) +

                                                       f_slots

                                                               return (
                                                                   '<tr class="rf" data-field="' +
                                                                   fs.id +
                                                                   '"><td><code>' +
                                                                   esc(s.name) +
                                                                   "</code></td><td>" +
                                                                   esc(s.description) +
                                                                   "</td></tr>"
                                                               );
                                                           })
                                                           .join("") +
                                                       "</tbody></table>";
                                               }
                                               if (f_css.length) {
                                                   r +=
                                                       "<h3>CSS Custom Properties</h3>" +
                                                       '<table class="data-table"><thead><tr><th>Property</th><th>Type</th><th>Default</th><th>Description</th></tr></thead><tbody>' +
                                                       f_css
                                                           .map(function (fc) {
                                                               var c = fc.cp;
                                                               return (
                                                                   '<tr class="rf" data-field="' +
                                                                   fc.id +
                                                                   '"><td><code>' +
                                                                   esc(c.name) +
                                                                   "</code></td><td>" +
                                                                   esc(c.type || "") +
                                                                   "</td><td><code>" +
                                                                   esc(c.defaultValue || "") +
                                                                   "</code></td><td>" +
                                                                   esc(c.description) +
                                                                   "</td></tr>"
                                                               );
                                                           })
                                                           .join("") +
                                                       "</tbody></table>";

                                               html += sectionPair(
                                                   "api",
                                                   "API",
                                                   codeLines.join("\n"),
                                                   r,
                                               );
                                           })();

                                       /* ── Variants ─────────────────────────────────────── */
                                       if (gMap.variants)
                                           (function () {
                                               var v = gMap.variants;
                                               var codeLines = [synHL('"items": [')];
                                               var rHtml = "<h2>Variants</h2>";
                                               (v.items || []).forEach(function (item, ii) {
                                                   var iid = fid("vi");

                                                               },

                                                       rHtml += rfDiv(
                                                           vid,
                                                           '<div class="variant-card"><h4>' +
                                                               esc(val.displayName) +
                                                               " <code>" +
                                                               esc(val.name) +

                                                   codeLines.push(synHL("]"));
                                                   codeLines.push(
                                                       synHL(
                                                           "}" +
                                                               (ii < v.items.length - 1

                                               html += sectionPair(

                                       /* ── States ───────────────────────────────────────── */
                                       if (gMap.states)
                                           (function () {
                                               var st = gMap.states;
                                               var codeLines = [synHL('"items": [')];
                                               var rows = [];
                                               (st.items || []).forEach(function (s, i) {
                                                   var sid = fid("st");
                                                   codeLines.push(
                                                       fieldJSON(s, sid) +

                                                               return (
                                                                   "<code>" +
                                                                   esc(k) +

                                                                   esc(s.tokens[k]) +

                                                           esc(s.displayName) +

                                                           esc(s.name) +
                                                           "</code></td><td>" +
                                                           esc(s.description) +
                                                           "</td><td>" +

                                                           "</td></tr>",

                                               codeLines.push(synHL("]"));
                                               var r =
                                                   "<h2>States</h2>" +

                                       /* ── Purpose ──────────────────────────────────────── */
                                       if (gMap.purpose)

                                                               ? ","
                                                               : ""),

                                                   var card =
                                                       '<div class="use-case ' +

                                                       '"><div class="use-case-badge">' +
                                                       (u.kind === "positive"

                                                   codeLines.push(

                                   /* ═══════════════════════════════════════════════════════

                                       /* ── Value ─────────────────────────────────────────── */

                                                   "links",
                                                   "Links",
                                                   codeLines.join("\n"),
                                                   r,
                                               );
                                           })();

                                       return html;
                                   }

                                   /* ═══════════════════════════════════════════════════════
                        INITIALIZATION
                        ═══════════════════════════════════════════════════════ */
                                   /* Data-driven initialization from build script registry */
                                   var SAMPLES = {{SAMPLE_REGISTRY}};
                                   SAMPLES.forEach(function (sample) {
                                       var el = document.getElementById(sample.id + "-data");
                                       if (!el) return;
                                       var data = JSON.parse(el.textContent);
                                       var kind = data.kind || sample.key;
                                       /* Pick renderer by entity kind */
                                       var renderer =
                                           kind === "token" || kind === "theme"
                                               ? renderToken
                                               : renderComponent;
                                       var target = document.getElementById("tab-" + sample.id);
                                       if (target) target.innerHTML = renderer(data);
                                   });

                                   /* ── Tab switching ──────────────────────────────────── */
                                   $$(".tab-btn").forEach(function (btn) {
                                       btn.addEventListener("click", function () {
                                           $$(".tab-btn").forEach(function (b) {
                                               b.classList.remove("active");
                                           });
                                           $$(".tab-content").forEach(function (c) {
                                               c.classList.remove("active");
                                           });
                                           btn.classList.add("active");
                                           document
                                               .getElementById(
                                                   "tab-" + btn.getAttribute("data-tab"),
                                               )
                                               .classList.add("active");
                                       });
                                   });

                                   /* ── No JS height sync needed — code column is position:absolute
                                         with height:100%, so it inherits the height of .section-pair
                                         which is driven entirely by .col-rendered (the only
                                         in-flow child). ── */

                                   /* ── Element-level hover highlighting ──────────────── */
                                   var currentHL = null;

                                   function clearIndicators() {
                                       $$(".offscreen-indicator.visible").forEach(function (ind) {
                                           ind.classList.remove("visible");
                                       });
                                   }

                                   /**
                                    * Check if a highlighted code-side element is scrolled out of
                                    * view in its .col-code container. If so, show the appropriate
                                    * sticky indicator (above or below).
                                    */
                                   function updateIndicators(fieldId) {
                                       clearIndicators();
                                       if (!fieldId) return;

                                       /* Find the code-side highlighted spans */
                                       var codeEls = $$('span[data-field="' + fieldId + '"]');
                                       if (!codeEls.length) return;

                                       /* The first code-side span determines the scroll container */
                                       var codeEl = codeEls[0];
                                       var colCode = codeEl.closest(".col-code");
                                       if (!colCode) return;
                                       var wrap = colCode.closest(".col-code-wrap");
                                       if (!wrap) return;

                                       var containerRect = colCode.getBoundingClientRect();
                                       var elRect = codeEl.getBoundingClientRect();

                                       if (elRect.bottom < containerRect.top + 1) {
                                           /* Element is above the visible area */
                                           var indAbove = wrap.querySelector(
                                               ".offscreen-indicator.above",
                                           );
                                           if (indAbove) indAbove.classList.add("visible");
                                       } else if (elRect.top > containerRect.bottom - 1) {
                                           /* Element is below the visible area */
                                           var indBelow = wrap.querySelector(
                                               ".offscreen-indicator.below",
                                           );
                                           if (indBelow) indBelow.classList.add("visible");
                                       }
                                   }

                                   document.addEventListener("mouseover", function (e) {
                                       var el = e.target.closest("[data-field]");
                                       if (!el) return;
                                       var fld = el.getAttribute("data-field");
                                       if (fld === currentHL) return;
                                       // Clear previous
                                       if (currentHL)
                                           $$('[data-field="' + currentHL + '"]').forEach(
                                               function (s) {
                                                   s.classList.remove("hl");
                                               },
                                           );
                                       currentHL = fld;
                                       $$('[data-field="' + fld + '"]').forEach(function (s) {
                                           s.classList.add("hl");
                                       });
                                       updateIndicators(fld);
                                   });

                                   document.addEventListener("mouseout", function (e) {
                                       var related = e.relatedTarget;
                                       if (related) {
                                           var next = related.closest
                                               ? related.closest("[data-field]")
                                               : null;
                                           if (
                                               next &&
                                               next.getAttribute("data-field") === currentHL
                                           )
                                               return;
                                       }
                                       if (currentHL) {
                                           $$('[data-field="' + currentHL + '"]').forEach(
                                               function (s) {
                                                   s.classList.remove("hl");
                                               },
                                           );
                                           currentHL = null;
                                           clearIndicators();
                                       }
                                   });

                                   /* Click an indicator to scroll the highlighted code into view */
                                   document.addEventListener("click", function (e) {
                                       var ind = e.target.closest(".offscreen-indicator");
                                       if (!ind || !currentHL) return;
                                       var wrap = ind.closest(".col-code-wrap");
                                       if (!wrap) return;
                                       var colCode = wrap.querySelector(".col-code");
                                       if (!colCode) return;
                                       var target = colCode.querySelector(
                                           'span[data-field="' + currentHL + '"]',
                                       );
                                       if (!target) return;
                                       target.scrollIntoView({
                                           block: "center",
                                           behavior: "smooth",
                                       });
                                       setTimeout(function () {
                                           clearIndicators();
                                       }, 350);
                                   });

                                   /* Update indicators when the code column is scrolled */
                                   document.addEventListener(
                                       "scroll",
                                       function () {
                                           if (currentHL) updateIndicators(currentHL);
                                       },
                                       true,
                                   );
                               })();
                    </script>
