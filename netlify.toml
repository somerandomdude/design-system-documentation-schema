# Correct Content-Types for agent/machine-readable artifacts

[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/AGENTS.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# The bundled schema lives under /v<version>/…; glob covers every version dir
[[headers]]
  for = "/v*/*.schema.json"
  [headers.values]
    Content-Type = "application/schema+json; charset=utf-8"
